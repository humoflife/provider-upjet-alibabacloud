apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: HavipAttachment
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/havipattachment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    haVipId: ${alicloud_havip.example.id}
    instanceId: ${alicloud_instance.example.id}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/havipattachment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    availabilityZone: ${data.alicloud_zones.default.zones.0.id}
    imageId: ${data.alicloud_images.example.images.0.id}
    instanceName: ${var.name}
    instanceType: ${data.alicloud_instance_types.example.instance_types.0.id}
    internetChargeType: PayByTraffic
    internetMaxBandwidthOut: 5
    securityGroups:
    - ${alicloud_security_group.example.id}
    systemDiskCategory: cloud_efficiency
    userData: echo 'net.ipv4.ip_forward=1'>> /etc/sysctl.conf
    vswitchIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: SecurityGroup
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/havipattachment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    description: ${var.name}
    name: ${var.name}
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/havipattachment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cidrBlock: 10.4.0.0/16
    vpcName: ${var.name}

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: Vswitch
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/havipattachment
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    cidrBlock: 10.4.0.0/24
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    vswitchName: ${var.name}
    zoneId: ${data.alicloud_zones.default.zones.0.id}
