apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: PublicIPAddressPoolCidrBlock
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/publicipaddresspoolcidrblock
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    cidrBlock: 47.118.126.0/25
    publicIpAddressPoolId: ${alicloud_vpc_public_ip_address_pool.default.id}

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: PublicIPAddressPool
metadata:
  annotations:
    meta.upbound.io/example-id: vpc/v1alpha1/publicipaddresspoolcidrblock
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    description: ${var.name}
    isp: BGP
    publicIpAddressPoolName: ${var.name}
    resourceGroupId: ${data.alicloud_resource_manager_resource_groups.default.ids.0}
