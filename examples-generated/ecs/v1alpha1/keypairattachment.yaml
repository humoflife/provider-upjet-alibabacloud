apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: KeyPairAttachment
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: attachment
  name: attachment
spec:
  forProvider:
    instanceIds: ${alicloud_instance.instance.*.id}
    keyName: ${alicloud_key_pair.pair.id}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: instance
  name: instance
spec:
  forProvider:
    count: 2
    imageId: ${data.alicloud_images.images.images[0].id}
    instanceChargeType: PostPaid
    instanceName: ${var.name}-${count.index + 1}
    instanceType: ${data.alicloud_instance_types.type.instance_types[0].id}
    internetChargeType: PayByTraffic
    internetMaxBandwidthOut: 5
    passwordSecretRef:
      key: example-key
      name: example-secret
      namespace: upbound-system
    securityGroups:
    - ${alicloud_security_group.group.id}
    systemDiskCategory: cloud_ssd
    vswitchId: ${alicloud_vswitch.vswitch.id}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: KeyPair
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: pair
  name: pair
spec:
  forProvider:
    keyName: ${var.name}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: SecurityGroup
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: group
  name: group
spec:
  forProvider:
    description: New security group
    name: ${var.name}
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpc

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: vpc
  name: vpc
spec:
  forProvider:
    cidrBlock: 10.1.0.0/21
    vpcName: ${var.name}

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: Vswitch
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/keypairattachment
  labels:
    testing.upbound.io/example-name: vswitch
  name: vswitch
spec:
  forProvider:
    cidrBlock: 10.1.1.0/24
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpc
    vswitchName: ${var.name}
    zoneId: ${data.alicloud_zones.default.zones[0].id}
