apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: Snapshot
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    category: standard
    diskId: ${alicloud_ecs_disk_attachment.default.disk_id}
    retentionDays: 20

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: Disk
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    category: cloud_essd
    diskName: ${var.name}
    size: 500
    zoneId: ${data.alicloud_instance_types.default.instance_types.0.availability_zones.0}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: DiskAttachment
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    diskId: ${alicloud_ecs_disk.default.id}
    instanceId: ${alicloud_instance.default.id}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    availabilityZone: ${data.alicloud_instance_types.default.instance_types.0.availability_zones.0}
    dataDisks:
    - category: cloud_essd
      size: 20
    imageId: ${data.alicloud_images.default.images.0.id}
    instanceChargeType: PostPaid
    instanceName: ${var.name}
    instanceType: ${data.alicloud_instance_types.default.instance_types.0.id}
    internetChargeType: PayByTraffic
    internetMaxBandwidthOut: "10"
    securityGroups: ${alicloud_security_group.default.*.id}
    systemDiskCategory: cloud_essd
    vswitchId: ${alicloud_vswitch.default.id}

---

apiVersion: ecs.alibabacloud.crossplane.io/v1alpha1
kind: SecurityGroup
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    securityGroupName: ${var.name}
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: default

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    cidrBlock: 192.168.0.0/16
    vpcName: ${var.name}

---

apiVersion: vpc.alibabacloud.crossplane.io/v1alpha1
kind: Vswitch
metadata:
  annotations:
    meta.upbound.io/example-id: ecs/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: default
  name: default
spec:
  forProvider:
    cidrBlock: 192.168.192.0/24
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: default
    vswitchName: ${var.name}
    zoneId: ${data.alicloud_zones.default.zones.0.id}
